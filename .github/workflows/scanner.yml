name: Torn Market Scanner

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run scanner
        env:
          API_KEY: ${{ secrets.TORN_API_KEY }}
        run: python torn_market_scanner.py
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: market-data
          path: '*.csv'
